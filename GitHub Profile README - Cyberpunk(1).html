<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* Animated neon grid background */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(138, 43, 226, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(138, 43, 226, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridShift 20s linear infinite;
        }

        @keyframes gridShift {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 50px 50px;
            }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .character {
            flex-shrink: 0;
        }

        .character img {
            max-width: 300px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.8));
        }

        .text-content {
            text-align: center;
            flex: 1;
        }

        .tagline {
            font-size: 18px;
            color: #00d9ff;
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.6);
            text-align: center;
            animation: taglineType 3s steps(45, end) forwards;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #ff006e;
        }

        @keyframes taglineType {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        .stats {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            gap: 20px;
        }

        .stat {
            flex: 1;
            padding: 20px;
            border: 2px solid #8a2be2;
            border-radius: 0;
            background: rgba(138, 43, 226, 0.1);
            position: relative;
            overflow: hidden;
        }

        .stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(138, 43, 226, 0.3), transparent);
            animation: scan 4s infinite;
        }

        @keyframes scan {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff006e;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #00d9ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tech-stack {
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
        }

        .tech-title {
            color: #ff006e;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-left: 2px solid #ff006e;
            padding-left: 10px;
        }

        .tech-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .tech-tag {
            padding: 8px 12px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            font-size: 12px;
            letter-spacing: 0.5px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .tech-tag:hover {
            background: rgba(0, 217, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.6);
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #8a2be2, transparent);
            margin: 30px 0;
        }

        .footer {
            font-size: 12px;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .typing-text {
            font-size: 14px;
            text-transform: none;
            letter-spacing: 0.05em;
            color: #00d9ff;
            font-weight: normal;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.4);
            padding-right: 5px;
            font-family: 'Courier New', monospace;
            white-space: normal;
            line-height: 1.6;
            position: relative;
            animation: textGlitch 4s infinite;
        }

        @keyframes textGlitch {
            0%, 100% {
                text-shadow: 0 0 10px rgba(0, 217, 255, 0.4);
                color: #00d9ff;
            }
            20% {
                text-shadow: 2px 0 #ff006e, -2px 0 #8a2be2, 0 0 10px rgba(0, 217, 255, 0.4);
            }
            40% {
                text-shadow: -2px 0 #ff006e, 2px 0 #8a2be2, 0 0 10px rgba(0, 217, 255, 0.4);
            }
            60% {
                text-shadow: 2px 0 #ff006e, -2px 0 #8a2be2, 0 0 10px rgba(0, 217, 255, 0.4);
            }
            80% {
                text-shadow: -2px 0 #ff006e, 2px 0 #8a2be2, 0 0 10px rgba(0, 217, 255, 0.4);
            }
        }

        .neon-line {
            display: inline-block;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ff006e, #8a2be2, #00d9ff, transparent);
            margin: 20px 0;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
        }

        @media (max-width: 900px) {
            .content {
                flex-direction: column;
                text-align: center;
            }

            .character img {
                max-width: 250px;
            }

            .title, .tagline, .footer {
                text-align: center;
            }

            .stats {
                justify-content: center;
            }

            .tech-stack {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-bg"></div>
        
        <div class="content">
            <div class="character">
                <img src="cyberpunk-character.png" alt="Cyberpunk character">
            </div>

            <div class="text-content">
                <div class="tagline">> ctrl+alt+deleting bad code since 2025</div>
                
                <div class="neon-line"></div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-value">12</div>
                        <div class="stat-label">Projects</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">8</div>
                        <div class="stat-label">Languages</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">∞</div>
                        <div class="stat-label">Curiosity</div>
                    </div>
                </div>

                <div class="tech-stack">
                    <div class="tech-title">Stack</div>
                    <div class="tech-items">
                        <div class="tech-tag">Node.js</div>
                        <div class="tech-tag">Python</div>
                        <div class="tech-tag">JavaScript</div>
                        <div class="tech-tag">React</div>
                        <div class="tech-tag">CSS</div>
                        <div class="tech-tag">Web3</div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="footer">
                    <div class="typing-text">There is some fiction in your truth, and some truth in your fiction. To know the truth, you must risk everything</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
